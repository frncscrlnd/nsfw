<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSFW — Navigator for Security Frameworks</title>
<link rel="icon" type="image/x-icon" href="img/favicon.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060810;
    --surface: #0a0e14;
    --border: #1a1f2e;
    --green: #00cc77;
    --green-bright: #00ff88;
    --text: #ccc;
    --dim: #333;
  }

  body {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,100,0.012) 2px, rgba(0,255,100,0.012) 4px
    );
  }

  /* ── boot ── */
  #boot-screen {
    position: fixed; inset: 0; z-index: 1000; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; transition: opacity 0.5s;
  }
  #boot-screen.hidden { opacity: 0; pointer-events: none; }
  .boot-title { font-size: 3rem; font-weight: 900; color: var(--green); letter-spacing: 0.15em; }
  .boot-log { font-size: 0.72rem; color: #3a6a4a; width: 340px; }
  .boot-log-line { padding: 2px 0; }
  .boot-log-line.ok::before   { content: '[OK] '; color: var(--green); }
  .boot-log-line.wait::before { content: '[..] '; color: #555; }
  .boot-bar { width: 340px; height: 2px; background: #1a2a1a; border-radius: 2px; overflow: hidden; }
  .boot-bar-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s ease; }

  /* ── layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 48px 36px; }
  .header-sub   { color: var(--green); font-size: 0.62rem; letter-spacing: 0.25em; margin-bottom: 8px; }
  .header-title {
    font-size: 2.8rem; font-weight: 900; letter-spacing: 0.08em;
    color: #fff; line-height: 1;
    text-shadow: 0 0 40px rgba(0,204,119,0.3); margin-bottom: 8px;
  }
  .header-desc { color: #2a4a3a; font-size: 0.75rem; margin-bottom: 40px; }

  /* ── search ── */
  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-box {
    display: flex; border: 1px solid #1a3a2a; border-radius: 6px;
    overflow: hidden; box-shadow: 0 0 30px rgba(0,204,119,0.05);
  }
  .search-input {
    flex: 1; background: #080f0a; border: none; outline: none;
    color: var(--green-bright); font-size: 1rem; padding: 14px 20px;
    font-family: inherit;
  }
  .search-input::placeholder { color: #1a3a2a; }
  .search-btn {
    background: var(--green); border: none; color: #000;
    padding: 0 30px; cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 0.8rem; letter-spacing: 0.12em;
    transition: background 0.15s;
  }
  .search-btn:hover { background: var(--green-bright); }

  /* ── feedback ── */
  .error-box {
    padding: 14px 20px; background: #1a0808;
    border: 1px solid #ff444433; border-radius: 6px;
    color: #ff8888; font-size: 0.8rem; margin-bottom: 24px;
  }
  .loading { color: var(--green); font-size: 0.9rem; margin: 40px 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .loading span { animation: pulse 1s infinite; }

  /* ── result header ── */
  .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

  /* ── table ── */
  .col-table-wrap {
    overflow-x: auto; border-radius: 8px; border: 1px solid var(--border);
    overflow: visible;
  }
  .col-table {
    width: 100%; border-collapse: collapse; font-size: 0.82rem; table-layout: fixed;
  }
  .col-table thead tr th {
    padding: 14px 12px; text-align: left;
    font-size: 0.72rem; letter-spacing: 0.12em; font-weight: 900;
    background: #0d1117; border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 2;
    overflow: visible;
  }
  .col-header-inner { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
  .col-header-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .col-header-count {
    margin-left: auto; font-size: 0.65rem; font-weight: 400; opacity: 0.6;
    background: rgba(255,255,255,0.05); border-radius: 3px; padding: 2px 6px;
  }
  .col-header-inner:has(.tactics-filter-wrap) .col-header-count,
  .col-header-inner:has(.kev-filter-wrap) .col-header-count,
  .col-header-inner:has(.d3-filter-wrap) .col-header-count {
    margin-left: 0;
  }
  .col-table tbody tr td {
    padding: 0;
    border-bottom: 1px solid #0f1118; border-right: 1px solid #111620;
    vertical-align: top;
  }
  .col-table tbody tr td:last-child { border-right: none; }
  .col-table tbody tr:hover td { background: rgba(255,255,255,0.008); }

  /* ── cell item ── */
  .cell-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px; user-select: none; min-height: 34px;
    transition: background 0.1s;
  }
  .cell-item:hover { background: rgba(255,255,255,0.025); }
  .cell-item.checked { background: var(--cell-dim); }
  .cell-item.checked:hover { filter: brightness(1.1); }

  .cell-cb {
    flex-shrink: 0; width: 13px; height: 13px; border-radius: 2px;
    border: 1px solid var(--cell-border, #2a2a2a);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
    font-size: 9px; font-weight: 900; color: #000;
    background: transparent; cursor: pointer; padding: 2px; margin: -2px;
  }
  .cell-cb:hover { border-color: var(--cell-color) !important; background: rgba(255,255,255,0.06); }
  .cell-item.checked .cell-cb { background: var(--cell-color); border-color: var(--cell-color); }
  .cell-item.checked .cell-cb::after { content: '✓'; }

  .cell-id {
    font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.12s; cursor: pointer; text-decoration: none; flex: 1;
  }
  .cell-item:not(.checked) .cell-id { color: #444; }
  .cell-item:not(.checked) .cell-id:hover { color: var(--cell-text); text-decoration: underline; }
  .cell-item.checked .cell-id { color: var(--cell-text); }
  .cell-item.checked .cell-id:hover { text-decoration: underline; }

  /* ── KEV badge ── */
  .kev-badge {
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.08em;
    padding: 1px 5px; border-radius: 3px;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.45);
    color: #f87171;
    cursor: default;
    white-space: nowrap;
    animation: kev-glow 2.5s ease-in-out infinite;
  }
  @keyframes kev-glow {
    0%, 100% { box-shadow: 0 0 0px rgba(239,68,68,0); }
    50%       { box-shadow: 0 0 6px rgba(239,68,68,0.35); }
  }

  /* ── CVSS badge ── */
  .cvss-badge {
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 900; letter-spacing: 0.04em;
    padding: 1px 6px; border-radius: 3px;
    cursor: default; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .cvss-CRITICAL { background: rgba(180,0,0,0.18);   border: 1px solid rgba(220,38,38,0.55);  color: #f87171; }
  .cvss-HIGH     { background: rgba(234,88,12,0.15);  border: 1px solid rgba(249,115,22,0.5); color: #fb923c; }
  .cvss-MEDIUM   { background: rgba(202,138,4,0.15);  border: 1px solid rgba(234,179,8,0.45); color: #fbbf24; }
  .cvss-LOW      { background: rgba(37,99,235,0.12);  border: 1px solid rgba(59,130,246,0.4); color: #93c5fd; }
  .cvss-NONE     { background: rgba(75,85,99,0.12);   border: 1px solid rgba(107,114,128,0.3);color: #9ca3af; }
  .cvss-UNKNOWN  { background: rgba(55,65,81,0.10);   border: 1px solid #1e2a38;              color: #374151; }

  /* ── SEVERITY FILTER ── */
  .sev-filter-wrap {
    display: inline-flex; align-items: center; margin-right: 6px;
    cursor: pointer; user-select: none;
  }
  .sev-dropdown-trigger {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.08em;
    padding: 1px 5px; border-radius: 3px;
    border: 1px solid #1a2030; background: #080c12; color: #3a5a7a;
    cursor: pointer; font-family: inherit;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    user-select: none; white-space: nowrap;
  }
  .sev-dropdown-trigger:hover {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.45);
    color: #f87171;
    animation: kev-glow 2.5s ease-in-out infinite;
  }
  .sev-dropdown-trigger.has-active {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.45);
    color: #f87171;
  }
  .sev-dropdown-trigger .trigger-arrow { font-size: 0.5rem; opacity: 0.7; transition: transform 0.15s; }
  .sev-dropdown-trigger.open .trigger-arrow { transform: rotate(180deg); }
  .sev-dropdown-trigger .trigger-badge {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.45);
    color: #f87171;
  }
  .sev-dropdown-menu {
    display: none; position: fixed; z-index: 9000; min-width: 160px;
    background: #07090f; border: 1px solid #1a2030; border-radius: 5px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7); overflow: hidden; animation: dropIn 0.12s ease;
  }
  .sev-dropdown-menu.open { display: block; }
  .sev-dropdown-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 1px solid #111820;
    font-size: 0.6rem; color: #2a3a5a; letter-spacing: 0.15em;
  }
  .sev-dropdown-item {
    display: flex; align-items: center; gap: 10px; padding: 6px 12px;
    cursor: pointer; border-bottom: 1px solid #0c1018;
    transition: background 0.1s; user-select: none;
  }
  .sev-dropdown-item:last-child { border-bottom: none; }
  .sev-dropdown-item:hover { background: rgba(255,255,255,0.03); }
  .sev-item-cb {
    width: 12px; height: 12px; border-radius: 2px; border: 1px solid #2a3a5a;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 900; color: #000;
    transition: background 0.12s, border-color 0.12s;
  }
  .sev-dropdown-item.active .sev-item-cb::after { content: '\2713'; }
  .sev-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sev-item-label { font-size: 0.68rem; flex: 1; letter-spacing: 0.05em; }
  .sev-item-count {
    font-size: 0.58rem; color: #1e2e40; background: rgba(0,0,0,0.3);
    padding: 1px 5px; border-radius: 2px; min-width: 24px; text-align: center;
  }
  .sev-dropdown-item.active .sev-item-count { background: rgba(202,138,4,0.15); color: #fbbf24; }

  /* ── KEV FILTER ── */
  .kev-filter-wrap {
    display: inline-flex; align-items: center;
    margin-left: auto; margin-right: 6px;
    cursor: pointer; user-select: none;
  }
  .kev-filter-label {
    font-size: 0.55rem; font-weight: 900; letter-spacing: 0.08em;
    padding: 1px 5px; border-radius: 3px;
    border: 1px solid #1a2030; background: #080c12; color: #3a5a7a;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .kev-filter-wrap:hover .kev-filter-label {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.45); color: #f87171;
    animation: kev-glow 2.5s ease-in-out infinite;
  }
  .kev-filter-wrap.active .kev-filter-label {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.45); color: #f87171;
  }

  .col-empty {
    color: #1e1e1e; font-size: 0.7rem; font-style: italic;
    padding: 7px 12px; display: block; min-height: 34px; line-height: 20px;
  }

  /* ── CPE PANEL ── */
  #cpe-panel {
    display: none; margin-top: 28px;
    border: 1px solid #1a2a1a; border-radius: 8px; overflow: hidden;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

  .cpe-panel-header {
    background: #080f0a; border-bottom: 1px solid #1a2a1a;
    padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .cpe-panel-title { font-size: 0.68rem; letter-spacing: 0.2em; color: #2a5a3a; font-weight: 900; }
  .cpe-panel-cve-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .cpe-cve-tab {
    font-size: 0.72rem; padding: 3px 10px; border-radius: 4px;
    border: 1px solid #eab30844; background: rgba(234,179,8,0.06); color: #eab308;
    cursor: pointer; transition: background 0.12s, border-color 0.12s;
    font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
  }
  .cpe-cve-tab:hover { background: rgba(234,179,8,0.12); }
  .cpe-cve-tab.active { background: rgba(234,179,8,0.15); border-color: #eab308; color: #fde047; }
  .cpe-cve-tab .kev-badge { animation: none; font-size: 0.5rem; padding: 1px 4px; }
  .cpe-cve-tab .cvss-badge { font-size: 0.5rem; padding: 1px 5px; }

  .cpe-panel-body { padding: 16px 18px; background: #060a08; }

  .cpe-group { margin-bottom: 18px; }
  .cpe-group:last-child { margin-bottom: 0; }
  .cpe-group-header {
    font-size: 0.68rem; color: #2a5a3a; letter-spacing: 0.15em;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid #0f1a14;
    display: flex; align-items: center; gap: 8px;
  }
  .cpe-vendor { color: var(--green); }
  .cpe-product { color: #aaa; }
  .cpe-sep { color: #2a3a2a; }

  /* ── inferred badge (fallback CPE) ── */
  .cpe-inferred-badge {
    font-size: 0.55rem; padding: 1px 5px; border-radius: 3px;
    border: 1px solid #2a3a2a; color: #3a5a3a; font-style: italic;
    white-space: nowrap; cursor: default;
  }

  .cpe-versions { display: flex; flex-wrap: wrap; gap: 6px; }
  .cpe-version-tag {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 4px;
    background: #0d1a10; border: 1px solid #1a3020; color: #4a8a5a;
    white-space: nowrap; transition: border-color 0.12s, color 0.12s;
  }
  .cpe-version-tag:hover { border-color: var(--green); color: var(--green); }
  .cpe-version-tag.wildcard { color: #2a4a3a; border-color: #0f1a14; font-style: italic; }

  /* inferred version tags slightly different color */
  .cpe-group.inferred .cpe-version-tag {
    background: #0d1408; border-color: #1a2a18; color: #3a6a3a;
  }
  .cpe-group.inferred .cpe-version-tag:hover { border-color: #3a7a3a; color: #5a9a5a; }

  .cpe-no-data { color: #2a3a2a; font-size: 0.75rem; font-style: italic; padding: 8px 0; }

  /* ── empty state ── */
  .empty-state { text-align: center; color: #1a2a1a; margin-top: 100px; }
  .empty-state .icon { font-size: 5rem; margin-bottom: 20px; }

  /* ── TACTICS FILTER DROPDOWN ── */
  .tactics-filter-wrap,
  .d3-filter-wrap {
    position: relative; display: inline-flex; align-items: center;
    margin-left: auto; margin-right: 6px;
  }
  .tactics-dropdown-trigger {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 1px 5px; border-radius: 3px;
    border: 1px solid #1a2030; background: #080c12; color: #3a5a7a;
    cursor: pointer; font-family: inherit;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    user-select: none; white-space: nowrap;
  }
  .tactics-dropdown-trigger:hover {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.45); color: #f87171;
    animation: kev-glow 2.5s ease-in-out infinite;
  }
  .tactics-dropdown-trigger.has-active {
    border-color: rgba(239,68,68,0.5); color: #f87171; background: rgba(239,68,68,0.08);
  }
  .tactics-dropdown-trigger .trigger-arrow { font-size: 0.5rem; transition: transform 0.15s; opacity: 0.7; }
  .tactics-dropdown-trigger.open .trigger-arrow { transform: rotate(180deg); }
  .tactics-dropdown-trigger .trigger-badge {
    font-size: 0.55rem; background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4); color: #f87171;
    padding: 0 5px; border-radius: 2px; font-weight: 900;
  }
  .tactics-dropdown-menu {
    display: none; position: fixed; z-index: 9000; min-width: 220px;
    background: #07090f; border: 1px solid #1a2030; border-radius: 5px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(239,68,68,0.05);
    overflow: hidden; animation: dropIn 0.12s ease;
  }
  @keyframes dropIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: translateY(0); } }
  .tactics-dropdown-menu.open { display: block; }
  .tactics-dropdown-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 1px solid #111820;
    font-size: 0.6rem; color: #2a3a5a; letter-spacing: 0.15em;
  }
  .tactics-dropdown-clear {
    font-size: 0.58rem; color: #3a5a7a; cursor: pointer;
    padding: 1px 6px; border-radius: 2px; border: 1px solid #1a2a3a;
    background: transparent; font-family: inherit; letter-spacing: 0.08em;
    transition: color 0.12s, border-color 0.12s;
  }
  .tactics-dropdown-clear:hover { color: #f87171; border-color: rgba(239,68,68,0.4); }
  .tactics-dropdown-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 12px;
    cursor: pointer; border-bottom: 1px solid #0c1018;
    transition: background 0.1s; user-select: none;
  }
  .tactics-dropdown-item:last-child { border-bottom: none; }
  .tactics-dropdown-item:hover { background: rgba(239,68,68,0.04); }
  .tactics-dropdown-item.active { background: rgba(239,68,68,0.07); }
  .tactic-item-cb {
    width: 12px; height: 12px; border-radius: 2px; border: 1px solid #2a3a5a;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 8px; font-weight: 900; color: #000;
    transition: background 0.12s, border-color 0.12s;
  }
  .tactics-dropdown-item.active .tactic-item-cb { background: #ef4444; border-color: #ef4444; }
  .tactics-dropdown-item.active .tactic-item-cb::after { content: '✓'; }
  .tactic-item-name { flex: 1; font-size: 0.68rem; color: #4a6a8a; letter-spacing: 0.05em; transition: color 0.1s; }
  .tactics-dropdown-item.active .tactic-item-name { color: #fca5a5; }
  .tactics-dropdown-item:hover .tactic-item-name  { color: #7a9aba; }
  .tactics-dropdown-item.active:hover .tactic-item-name { color: #fca5a5; }
  .tactic-item-id { font-size: 0.58rem; color: #1e2e40; transition: color 0.1s; }
  .tactics-dropdown-item.active .tactic-item-id { color: #7a3a3a; }
  .tactic-item-count {
    font-size: 0.58rem; color: #1e2e40; background: rgba(0,0,0,0.3);
    padding: 1px 5px; border-radius: 2px; min-width: 24px; text-align: center;
    transition: color 0.1s, background 0.1s;
  }
  .tactics-dropdown-item.active .tactic-item-count { color: #f87171; background: rgba(239,68,68,0.15); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #1a3a2a; border-radius: 3px; }
</style>
</head>
<body>

<div id="boot-screen">
  <div class="boot-title">NSFW</div>
  <div class="boot-log" id="boot-log"></div>
  <div class="boot-bar"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
</div>

<div class="main" id="app" style="display:none;">
  <div style="margin-bottom:40px;">
    <h1 class="header-title">NSFW</h1>
    <div class="header-sub">&#9658; NAVIGATOR for SECURITY FRAMEWORKS</div>
    <div class="header-desc">
      <a href="https://www.cve.org/" target="_blank" style="color:#fde047;">CVE</a> ·
      <a href="https://cwe.mitre.org/" target="_blank" style="color:#93c5fd;">CWE</a> ·
      <a href="https://cpe.mitre.org/" target="_blank" style="color:#eab308">CPE</a> ·
      <a href="https://capec.mitre.org/" target="_blank" style="color:#fdba74;">CAPEC</a> ·

// ─────────────────────────────────────────────
//  URL RESOLVERS
// ─────────────────────────────────────────────
function getUrl(id, type) {
  switch (type) {
    case "CVE":    return `https://www.cve.org/CVERecord?id=${id}`;
    case "CWE":    return `https://cwe.mitre.org/data/definitions/${id.replace('CWE-','')}.html`;
    case "CAPEC":  return `https://capec.mitre.org/data/definitions/${id.replace('CAPEC-','')}.html`;
    case "ATT&CK":
      if (id.includes('.')) { const [b,s]=id.split('.'); return `https://attack.mitre.org/techniques/${b}/${s}/`; }
      return `https://attack.mitre.org/techniques/${id}/`;
    case "D3FEND": {
      const fullName = D3FEND_ABBR_TO_FULL[id] || id.replace(/^D3-/, '');
      return `https://d3fend.mitre.org/technique/d3f:${fullName}/`;
    }
    default: return null;
  }
}

// ─────────────────────────────────────────────
//  CPE PARSING
// ─────────────────────────────────────────────
function parseCpe(cpe) {
  // CPE reale: cpe:2.3:type:vendor:product:version:...
  if (cpe.startsWith("cpe:")) {
    const parts = cpe.split(':');
    return {
      raw:        cpe,
      isFallback: false,
      type:       parts[2] || '*',
      vendor:     parts[3] || '*',
      product:    parts[4] || '*',
      version:    parts[5] || '*',
    };
  }

  // Fallback dallo script Python: product:vendor:product[:version]
  // Usiamo indexOf per non spezzare stringhe di versione come "< 0.3.0"
  if (cpe.startsWith("product:")) {
    const idx0 = cpe.indexOf(':');                               // fine "product"
    const idx1 = idx0 !== -1 ? cpe.indexOf(':', idx0 + 1) : -1; // fine vendor
    const idx2 = idx1 !== -1 ? cpe.indexOf(':', idx1 + 1) : -1; // fine product name
    const vendor  = idx1 !== -1 ? cpe.slice(idx0 + 1, idx1) : '*';
    const product = idx2 !== -1 ? cpe.slice(idx1 + 1, idx2) :
                    idx1 !== -1 ? cpe.slice(idx1 + 1)        : '*';
    const version = idx2 !== -1 ? cpe.slice(idx2 + 1) || '*' : '*';
    return {
      raw:        cpe,
      isFallback: true,
      type:       'a',
      vendor,
      product,
      version,
    };
  }

  // Formato sconosciuto — mostra raw come vendor
  return { raw: cpe, isFallback: false, type: '*', vendor: cpe, product: '*', version: '*' };
}

function groupCpes(cpes) {
  const groups = {};
  for (const cpe of cpes) {
    const p   = parseCpe(cpe);
    const key = `${p.vendor}:::${p.product}`;
    if (!groups[key]) {
      groups[key] = {
        vendor:     p.vendor,
        product:    p.product,
        versions:   [],
        isFallback: p.isFallback,
      };
    }
    groups[key].versions.push({ version: p.version, isFallback: p.isFallback });
  }
  return Object.values(groups);
}

// ─────────────────────────────────────────────
//  CVSS HELPERS
// ─────────────────────────────────────────────
const CVSS_PRIORITY = ['v40', 'v31', 'v30', 'v2'];

function getBestCvss(cveId) {
  const entry = DB.cve_cvss[cveId];
  if (!entry) return null;
  for (const ver of CVSS_PRIORITY) {
    if (entry[ver] && entry[ver].baseScore != null) {
      const d = entry[ver];
      const sev = d.baseSeverity
        ? d.baseSeverity.toUpperCase()
        : scoreToSeverityV2(d.baseScore);
      return { version: ver, score: d.baseScore, severity: sev, vector: d.vectorString || null };
    }
  }
  return null;
}

function scoreToSeverityV2(score) {
  if (score == null) return 'UNKNOWN';
  if (score === 0)   return 'NONE';
  if (score < 4.0)   return 'LOW';
  if (score < 7.0)   return 'MEDIUM';
  if (score < 9.0)   return 'HIGH';
  return 'CRITICAL';
}

const CVSS_VER_LABEL = { v40:'4.0', v31:'3.1', v30:'3.0', v2:'2.0' };

function makeCvssBadge(cveId) {
  const cvss  = getBestCvss(cveId);
  const badge = document.createElement('span');
  badge.className = 'cvss-badge';
  if (!cvss) {
    badge.classList.add('cvss-UNKNOWN');
    badge.textContent = 'N/A';
    badge.title = 'No CVSS data available';
    return badge;
  }
  const sev = cvss.severity || 'UNKNOWN';
  badge.classList.add(`cvss-${sev}`);
  badge.textContent = cvss.score.toFixed(1);
  badge.title = [
    `CVSSv${CVSS_VER_LABEL[cvss.version] || cvss.version}`,
    `Score: ${cvss.score}`,
    `Severity: ${sev}`,
    cvss.vector ? `Vector: ${cvss.vector}` : null,
  ].filter(Boolean).join('\n');
  return badge;
}

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let DB = {}, INV = {};
let KEV = new Set();
let INV_TECHNIQUE_TACTICS = {};
let INV_D3FEND_TACTICS = {};

let activeTacticFilters   = new Set();
let activeD3TacticFilters = new Set();
let kevFilterActive       = false;
let activeSevFilters      = new Set();

let universe     = null;
let checkedIds   = new Set();
let activeCpeCve = null;

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
const bootLog  = document.getElementById('boot-log');
const bootFill = document.getElementById('boot-bar-fill');

function bootLine(text, status='wait') {
  const div = document.createElement('div');
  div.className = `boot-log-line ${status}`;
  div.textContent = text;
  bootLog.appendChild(div);
  return div;
}

async function loadDatabases() {
  const keys  = Object.keys(DATA_FILES);
  const lines = {};
  keys.forEach(k => { lines[k] = bootLine(DATA_FILES[k]); });

  for (let i = 0; i < keys.length; i++) {
    const k = keys[i];
    try {
      const res = await fetch(DATA_BASE + DATA_FILES[k]);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      DB[k] = await res.json();
      lines[k].className = 'boot-log-line ok';
    } catch(e) {
      lines[k].className = '';
      await new Promise(r => setTimeout(r, 400));
      lines[k].textContent = `[ERR] ${DATA_FILES[k]} — ${e.message}`;
    }
    bootFill.style.width = `${Math.round((i+1)/keys.length*80)}%`;
  }

  // ── Carica kevs.txt ──
  const kevLine = bootLine('kevs.txt');
  try {
    const res = await fetch(DATA_BASE + 'kevs.txt');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    text.split('\n').forEach(line => {
      const id = line.trim().toUpperCase();
      if (id.startsWith('CVE-')) KEV.add(id);
    });
    kevLine.className = 'boot-log-line ok';
  } catch(e) {
    kevLine.textContent = `[SKIP] kevs.txt — ${e.message}`;
  }

  const invertLine = bootLine('building index...');
  DB.cve_cwe            = DB.cve_cwe            || {};
  DB.cwe_capec          = DB.cwe_capec          || {};
  DB.capec_attack       = DB.capec_attack       || {};
  DB.attack_defend      = DB.attack_defend      || {};
  DB.cve_cpe            = DB.cve_cpe            || {};
  DB.cve_cvss           = DB.cve_cvss           || {};
  DB.tactics_techniques = DB.tactics_techniques || {};
  DB.d3fend_tactics     = DB.d3fend_tactics     || {};

  INV.cwe_cve   = invertMap(DB.cve_cwe);
  INV.capec_cwe = invertMap(DB.cwe_capec);
  INV.atk_capec = invertMap(DB.capec_attack);
  INV.d3_atk    = invertMap(DB.attack_defend);

  INV_TECHNIQUE_TACTICS = {};
  for (const [ta, techniques] of Object.entries(DB.tactics_techniques)) {
    for (const tech of techniques) {
      const key = tech.toUpperCase();
      if (!INV_TECHNIQUE_TACTICS[key]) INV_TECHNIQUE_TACTICS[key] = [];
      if (!INV_TECHNIQUE_TACTICS[key].includes(ta)) INV_TECHNIQUE_TACTICS[key].push(ta);
    }
  }

  INV_D3FEND_TACTICS = {};
  for (const [d3Id, tactic] of Object.entries(DB.d3fend_tactics)) {
    INV_D3FEND_TACTICS[d3Id.toUpperCase()] = tactic;
  }

  invertLine.className = 'boot-log-line ok';
  bootFill.style.width = '100%';
  await new Promise(r => setTimeout(r, 400));

  const bs = document.getElementById('boot-screen');
  bs.classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  setTimeout(() => bs.remove(), 600);
}

loadDatabases();

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function invertMap(m) {
  const out = {};
  for (const [k, vals] of Object.entries(m))
    for (const v of vals) { if (!out[v]) out[v] = []; out[v].push(k); }
  return out;
}
function expand(ids, mapping) {
  const result = new Set();
  for (const id of ids) for (const v of (mapping[id] || [])) result.add(v);
  return result;
}

const PATTERNS = [
  [/^CVE-\d{4}-\d+$/i,    "CVE"],
  [/^CWE-\d+$/i,          "CWE"],
  [/^CAPEC-\d+$/i,        "CAPEC"],
  [/^T\d{4}(\.\d{3})?$/i, "ATT&CK"],
  [/^D3-[A-Z]+$/i,        "D3FEND"],
];
function detectType(id) {
  for (const [re, t] of PATTERNS) if (re.test(id)) return t;
  return null;
}

function isKev(id) { return KEV.has(id.toUpperCase()); }

function makeKevBadge(small = false) {
  const b = document.createElement('span');
  b.className = 'kev-badge';
  b.textContent = 'KEV';
  b.title = 'Known Exploited Vulnerability — CISA KEV Catalog';
  if (small) b.style.cssText = 'animation:none;font-size:0.5rem;padding:1px 4px;';
  return b;
}

// ─────────────────────────────────────────────
//  ATT&CK TACTICS FILTER LOGIC
// ─────────────────────────────────────────────
function techniquePassesFilter(techId) {
  if (activeTacticFilters.size === 0) return true;
  const tactics = INV_TECHNIQUE_TACTICS[techId.toUpperCase()] || [];
  return tactics.some(ta => activeTacticFilters.has(ta));
}

function getRelevantTactics(attackIds) {
  const counts = new Map();
  for (const techId of attackIds) {
    for (const ta of (INV_TECHNIQUE_TACTICS[techId.toUpperCase()] || []))
      counts.set(ta, (counts.get(ta) || 0) + 1);
  }
  return new Map([...counts.entries()].sort((a,b) => a[0].localeCompare(b[0])));
}

// ─────────────────────────────────────────────
//  D3FEND TACTICS FILTER LOGIC
// ─────────────────────────────────────────────
function d3TechniquePasses(d3Id) {
  if (activeD3TacticFilters.size === 0) return true;
  const tactic = INV_D3FEND_TACTICS[d3Id.toUpperCase()];
  return tactic ? activeD3TacticFilters.has(tactic) : false;
}

function getRelevantD3Tactics(d3Ids) {
  const counts = new Map();
  for (const id of d3Ids) {
    const tactic = INV_D3FEND_TACTICS[id.toUpperCase()];
    if (tactic) counts.set(tactic, (counts.get(tactic) || 0) + 1);
  }
  return new Map([...counts.entries()].sort((a,b) => a[0].localeCompare(b[0])));
}

// ─────────────────────────────────────────────
//  GRAPH TRAVERSAL
// ─────────────────────────────────────────────
function getRelated(inputId) {
  const id = inputId.trim().toUpperCase(), tipo = detectType(id);
  if (!tipo) return null;
  const r = {}; FW.forEach(fw => r[fw] = new Set()); r[tipo].add(id);

  if (tipo === "CVE") {
    const cwes=expand([id],DB.cve_cwe); cwes.forEach(x=>r["CWE"].add(x));
    const capecs=expand(cwes,DB.cwe_capec); capecs.forEach(x=>r["CAPEC"].add(x));
    const atks=expand(capecs,DB.capec_attack); atks.forEach(x=>r["ATT&CK"].add(x));
    expand(atks,DB.attack_defend).forEach(x=>r["D3FEND"].add(x));
  } else if (tipo === "CWE") {
    const capecs=expand([id],DB.cwe_capec); capecs.forEach(x=>r["CAPEC"].add(x));
    const atks=expand(capecs,DB.capec_attack); atks.forEach(x=>r["ATT&CK"].add(x));
    expand(atks,DB.attack_defend).forEach(x=>r["D3FEND"].add(x));
    expand([id],INV.cwe_cve).forEach(x=>r["CVE"].add(x));
  } else if (tipo === "CAPEC") {
    const atks=expand([id],DB.capec_attack); atks.forEach(x=>r["ATT&CK"].add(x));
    expand(atks,DB.attack_defend).forEach(x=>r["D3FEND"].add(x));
    const cwes=expand([id],INV.capec_cwe); cwes.forEach(x=>r["CWE"].add(x));
    expand(cwes,INV.cwe_cve).forEach(x=>r["CVE"].add(x));
  } else if (tipo === "ATT&CK") {
    expand([id],DB.attack_defend).forEach(x=>r["D3FEND"].add(x));
    const capecs=expand([id],INV.atk_capec); capecs.forEach(x=>r["CAPEC"].add(x));
    const cwes=expand(capecs,INV.capec_cwe); cwes.forEach(x=>r["CWE"].add(x));
    expand(cwes,INV.cwe_cve).forEach(x=>r["CVE"].add(x));
  } else if (tipo === "D3FEND") {
    const atks=expand([id],INV.d3_atk); atks.forEach(x=>r["ATT&CK"].add(x));
    const capecs=expand(atks,INV.atk_capec); capecs.forEach(x=>r["CAPEC"].add(x));
    const cwes=expand(capecs,INV.capec_cwe); cwes.forEach(x=>r["CWE"].add(x));
    expand(cwes,INV.cwe_cve).forEach(x=>r["CVE"].add(x));
  }
  return r;
}

function computeUniverse() {
  const ids = [...checkedIds]; if (!ids.length) return null;
  let result = getRelated(ids[0]); if (!result) return null;
  for (const id of ids.slice(1)) {
    const next = getRelated(id); if (!next) continue;
    FW.forEach(fw => { result[fw] = new Set([...result[fw]].filter(x => next[fw].has(x))); });
  }
  return Object.fromEntries(FW.map(fw => [fw, [...result[fw]].sort()]));
}

function applyTacticFilter(u) {
  if (!u) return null;

  if (activeTacticFilters.size > 0) {
    const filteredAtk = u["ATT&CK"].filter(id => techniquePassesFilter(id));
    const atkSet = new Set(filteredAtk);
    const filteredCapec = u["CAPEC"].filter(capecId =>
      (DB.capec_attack[capecId] || []).some(a => atkSet.has(a)));
    const capecSet = new Set(filteredCapec);
    const filteredCwe = u["CWE"].filter(cweId =>
      (DB.cwe_capec[cweId] || []).some(c => capecSet.has(c)));
    const cweSet = new Set(filteredCwe);
    const filteredCve = u["CVE"].filter(cveId =>
      (DB.cve_cwe[cveId] || []).some(c => cweSet.has(c)));
    const filteredD3 = [...expand(filteredAtk, DB.attack_defend)].sort();
    u = { "CVE":filteredCve,"CWE":filteredCwe,"CAPEC":filteredCapec,"ATT&CK":filteredAtk,"D3FEND":filteredD3 };
  }

  if (kevFilterActive) {
    const filteredCve = u["CVE"].filter(id => isKev(id));
    const cveSet = new Set(filteredCve);
    const filteredCwe = u["CWE"].filter(cweId =>
      (INV.cwe_cve[cweId] || []).some(cve => cveSet.has(cve)));
    const cweSet = new Set(filteredCwe);
    const filteredCapec = u["CAPEC"].filter(capecId =>
      (INV.capec_cwe[capecId] || []).some(cwe => cweSet.has(cwe)));
    const capecSet = new Set(filteredCapec);
    const filteredAtk = u["ATT&CK"].filter(atkId =>
      (INV.atk_capec[atkId] || []).some(c => capecSet.has(c)));
    const filteredD3 = [...expand(filteredAtk, DB.attack_defend)].sort();
    u = { "CVE":filteredCve,"CWE":filteredCwe,"CAPEC":filteredCapec,"ATT&CK":filteredAtk,"D3FEND":filteredD3 };
  }

  if (activeD3TacticFilters.size > 0) {
    const filteredD3 = u["D3FEND"].filter(id => d3TechniquePasses(id));
    const d3Set = new Set(filteredD3);
    const filteredAtk = u["ATT&CK"].filter(atkId =>
      (DB.attack_defend[atkId] || []).some(d3 => d3Set.has(d3)));
    const atkSet = new Set(filteredAtk);
    const filteredCapec = u["CAPEC"].filter(capecId =>
      (DB.capec_attack[capecId] || []).some(a => atkSet.has(a)));
    const capecSet = new Set(filteredCapec);
    const filteredCwe = u["CWE"].filter(cweId =>
      (DB.cwe_capec[cweId] || []).some(c => capecSet.has(c)));
    const cweSet = new Set(filteredCwe);
    const filteredCve = u["CVE"].filter(cveId =>
      (DB.cve_cwe[cveId] || []).some(c => cweSet.has(c)));
    u = { "CVE":filteredCve,"CWE":filteredCwe,"CAPEC":filteredCapec,"ATT&CK":filteredAtk,"D3FEND":filteredD3 };
  }

  if (activeSevFilters.size > 0) {
    const filteredCve = u["CVE"].filter(id => {
      const cvss = getBestCvss(id);
      const sev  = cvss ? (cvss.severity || 'UNKNOWN') : 'UNKNOWN';
      return activeSevFilters.has(sev);
    });
    const cveSet = new Set(filteredCve);
    const filteredCwe = u["CWE"].filter(cweId =>
      (INV.cwe_cve[cweId] || []).some(cve => cveSet.has(cve)));
    const cweSet = new Set(filteredCwe);
    const filteredCapec = u["CAPEC"].filter(capecId =>
      (INV.capec_cwe[capecId] || []).some(cwe => cweSet.has(cwe)));
    const capecSet = new Set(filteredCapec);
    const filteredAtk = u["ATT&CK"].filter(atkId =>
      (INV.atk_capec[atkId] || []).some(c => capecSet.has(c)));
    const filteredD3 = [...expand(filteredAtk, DB.attack_defend)].sort();
    u = { "CVE":filteredCve,"CWE":filteredCwe,"CAPEC":filteredCapec,"ATT&CK":filteredAtk,"D3FEND":filteredD3 };
  }

  return u;
}

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const si=$("search-input"), sb=$("search-btn");
const eb=$("error-box"), ld=$("loading"), rs=$("results"), es=$("empty-state");
const cpePanel=$("cpe-panel"), cpeTabs=$("cpe-cve-tabs"), cpeBody=$("cpe-panel-body");

// ─────────────────────────────────────────────
//  CPE PANEL
// ─────────────────────────────────────────────
function getCheckedCves() {
  return [...checkedIds].filter(id => detectType(id) === "CVE").sort();
}

function renderCpePanel() {
  const cves = getCheckedCves();
  if (!cves.length) { cpePanel.style.display="none"; activeCpeCve=null; return; }
  cpePanel.style.display = "block";
  if (!activeCpeCve || !cves.includes(activeCpeCve)) activeCpeCve = cves[0];

  cpeTabs.innerHTML = "";
  cves.forEach(cve => {
    const tab = document.createElement("button");
    tab.className = "cpe-cve-tab" + (cve === activeCpeCve ? " active" : "");
    const span = document.createElement('span');
    span.textContent = cve;
    tab.appendChild(span);
    if (isKev(cve)) tab.appendChild(makeKevBadge(true));
    tab.appendChild(makeCvssBadge(cve));
    tab.addEventListener("click", () => { activeCpeCve = cve; renderCpePanel(); });
    cpeTabs.appendChild(tab);
  });

  cpeBody.innerHTML = "";
  const cpes = DB.cve_cpe[activeCpeCve];
  if (!cpes || cpes.length === 0) {
    const msg = document.createElement("div");
    msg.className = "cpe-no-data";
    msg.textContent = `No CPE data available for ${activeCpeCve}`;
    cpeBody.appendChild(msg);
    return;
  }

  groupCpes(cpes).forEach(g => {
    const grp = document.createElement("div");
    grp.className = "cpe-group" + (g.isFallback ? " inferred" : "");

    const hdr = document.createElement("div");
    hdr.className = "cpe-group-header";

    const vendorSpan = document.createElement('span');
    vendorSpan.className = 'cpe-vendor';
    vendorSpan.textContent = g.vendor;
    hdr.appendChild(vendorSpan);

    const sepSpan = document.createElement('span');
    sepSpan.className = 'cpe-sep';
    sepSpan.textContent = '/';
    hdr.appendChild(sepSpan);

    const productSpan = document.createElement('span');
    productSpan.className = 'cpe-product';
    productSpan.textContent = g.product;
    hdr.appendChild(productSpan);

    if (g.isFallback) {
      const badge = document.createElement('span');
      badge.className = 'cpe-inferred-badge';
      badge.textContent = 'inferred';
      badge.title = 'No official CPE — derived from vendor/product fields in CVE data';
      hdr.appendChild(badge);
    }

    grp.appendChild(hdr);

    const vw = document.createElement("div");
    vw.className = "cpe-versions";

    g.versions.forEach(({ version }) => {
      const tag = document.createElement("span");
      const isWild = version === '*' || !version;
      tag.className = "cpe-version-tag" + (isWild ? " wildcard" : "");
      tag.textContent = isWild ? 'all versions' : version;
      tag.title = `Version: ${version}`;
      vw.appendChild(tag);
    });

    grp.appendChild(vw);
    cpeBody.appendChild(grp);
  });
}

// ─────────────────────────────────────────────
//  SHARED: close all dropdown menus
// ─────────────────────────────────────────────
function closeTacticDropdown() {
  document.querySelectorAll('.tactics-dropdown-menu, .sev-dropdown-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.tactics-dropdown-trigger, .sev-dropdown-trigger').forEach(t => t.classList.remove('open'));
}

function cleanupTacticMenus() {
  document.querySelectorAll('body > .tactics-dropdown-menu, body > .sev-dropdown-menu').forEach(m => m.remove());
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.tactics-filter-wrap') &&
      !e.target.closest('.d3-filter-wrap') &&
      !e.target.closest('.sev-filter-wrap')) {
    closeTacticDropdown();
  }
});

// ─────────────────────────────────────────────
//  ATT&CK TACTIC FILTER RENDER
// ─────────────────────────────────────────────
function renderTacticFilter(thElement, containerElement, allAttackIds) {
  const old = thElement.querySelector('.tactics-filter-wrap');
  if (old) old.remove();
  const tacticsMap = getRelevantTactics(allAttackIds);
  if (tacticsMap.size === 0) return;

  const wrap    = document.createElement('div'); wrap.className = 'tactics-filter-wrap';
  const trigger = document.createElement('div');
  trigger.className = 'tactics-dropdown-trigger' + (activeTacticFilters.size > 0 ? ' has-active' : '');

  const triggerLabel = document.createElement('span'); triggerLabel.textContent = 'TACTIC';
  trigger.appendChild(triggerLabel);
  if (activeTacticFilters.size > 0) {
    const badge = document.createElement('span'); badge.className = 'trigger-badge';
    badge.textContent = activeTacticFilters.size; trigger.appendChild(badge);
  }
  const arrow = document.createElement('span'); arrow.className = 'trigger-arrow'; arrow.textContent = '▼';
  trigger.appendChild(arrow);

  const menu = document.createElement('div'); menu.className = 'tactics-dropdown-menu';
  const header = document.createElement('div'); header.className = 'tactics-dropdown-header';
  const headerLabel = document.createElement('span'); headerLabel.textContent = 'FILTER BY TACTIC';
  header.appendChild(headerLabel);
  if (activeTacticFilters.size > 0) {
    const clr = document.createElement('button'); clr.className = 'tactics-dropdown-clear'; clr.textContent = '✕ CLEAR ALL';
    clr.addEventListener('click', (e) => { e.stopPropagation(); activeTacticFilters.clear(); closeTacticDropdown(); renderTable(); renderCpePanel(); });
    header.appendChild(clr);
  }
  menu.appendChild(header);

  for (const [taId, count] of tacticsMap) {
    const name = TACTIC_NAMES[taId] || taId, isActive = activeTacticFilters.has(taId);
    const item = document.createElement('div'); item.className = 'tactics-dropdown-item' + (isActive ? ' active' : ''); item.title = taId;
    const cb = document.createElement('div'); cb.className = 'tactic-item-cb';
    const nameSpan = document.createElement('span'); nameSpan.className = 'tactic-item-name'; nameSpan.textContent = name;
    const idSpan = document.createElement('span'); idSpan.className = 'tactic-item-id'; idSpan.textContent = taId;
    const countSpan = document.createElement('span'); countSpan.className = 'tactic-item-count'; countSpan.textContent = count;
    item.appendChild(cb); item.appendChild(nameSpan); item.appendChild(idSpan); item.appendChild(countSpan);
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeTacticFilters.has(taId)) activeTacticFilters.delete(taId); else activeTacticFilters.add(taId);
      renderTable(); renderCpePanel();
      const newTrigger = document.querySelector('.tactics-filter-wrap .tactics-dropdown-trigger');
      if (newTrigger) newTrigger.click();
    });
    menu.appendChild(item);
  }

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = menu.classList.contains('open');
    closeTacticDropdown();
    if (!isOpen) {
      const rect = trigger.getBoundingClientRect();
      menu.style.top = (rect.bottom + 4) + 'px'; menu.style.left = rect.left + 'px';
      setTimeout(() => { const mRect = menu.getBoundingClientRect(); if (mRect.right > window.innerWidth - 8) menu.style.left = (rect.right - mRect.width) + 'px'; }, 0);
      menu.classList.add('open'); trigger.classList.add('open');
    }
  });

  wrap.appendChild(trigger); document.body.appendChild(menu); containerElement.appendChild(wrap);
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
function doSearch(q) {
  const val = (q || si.value).trim().toUpperCase();
  if (!val) return;
  si.value = "";
  if (!detectType(val)) { setError(`Unrecognized ID: "${val}"`); return; }
  if (checkedIds.has(val)) return;
  setError(""); setLoading(true);
  setTimeout(() => {
    checkedIds.add(val);
    const u = computeUniverse();
    if (!u || FW.every(fw => u[fw].length === 0)) {
      checkedIds.delete(val); setLoading(false);
      setError(`"${val}" produces no results with the current selection.`); return;
    }
    universe = u; setLoading(false);
    renderTable(); renderCpePanel();
  }, 10);
}

// ─────────────────────────────────────────────
//  TOGGLE CHECKBOX
// ─────────────────────────────────────────────
function toggleCheck(id) {
  const wasChecked = checkedIds.has(id);
  if (wasChecked) checkedIds.delete(id); else checkedIds.add(id);
  setLoading(true);
  setTimeout(() => {
    if (checkedIds.size === 0) {
      universe = null; rs.style.display="none"; es.style.display="block";
      setLoading(false); renderCpePanel(); return;
    }
    const u = computeUniverse();
    if (!u || FW.every(fw => u[fw].length === 0)) {
      if (wasChecked) checkedIds.add(id); else checkedIds.delete(id);
      setLoading(false); setError(`No results for this combination — reverted.`); return;
    }
    setError(""); universe = u; setLoading(false);
    renderTable(); renderCpePanel();
  }, 10);
}

// ─────────────────────────────────────────────
//  SEVERITY FILTER RENDER
// ─────────────────────────────────────────────
const SEV_ORDER = ['CRITICAL','HIGH','MEDIUM','LOW','NONE'];
const SEV_CFG = {
  CRITICAL: { dot:'#ef4444', label:'CRITICAL', itemColor:'#f87171' },
  HIGH:     { dot:'#f97316', label:'HIGH',     itemColor:'#fb923c' },
  MEDIUM:   { dot:'#eab308', label:'MEDIUM',   itemColor:'#fbbf24' },
  LOW:      { dot:'#3b82f6', label:'LOW',      itemColor:'#93c5fd' },
  NONE:     { dot:'#6b7280', label:'NONE',     itemColor:'#9ca3af' },
};

function getSevCounts(cveIds) {
  const counts = new Map();
  for (const id of cveIds) {
    const cvss = getBestCvss(id);
    const sev  = cvss ? (cvss.severity || 'UNKNOWN') : 'UNKNOWN';
    if (sev === 'UNKNOWN') continue;
    counts.set(sev, (counts.get(sev) || 0) + 1);
  }
  return counts;
}

function renderSevFilter(allCveIds) {
  const counts = getSevCounts(allCveIds);
  if (counts.size === 0) return null;

  const wrap    = document.createElement('div'); wrap.className = 'sev-filter-wrap';
  const trigger = document.createElement('div');
  trigger.className = 'sev-dropdown-trigger' + (activeSevFilters.size > 0 ? ' has-active' : '');

  const triggerLabel = document.createElement('span'); triggerLabel.textContent = 'SEVERITY';
  trigger.appendChild(triggerLabel);
  if (activeSevFilters.size > 0) {
    const badge = document.createElement('span'); badge.className = 'trigger-badge';
    badge.textContent = activeSevFilters.size; trigger.appendChild(badge);
  }
  const arrow = document.createElement('span'); arrow.className = 'trigger-arrow'; arrow.textContent = '▼';
  trigger.appendChild(arrow);

  const menu = document.createElement('div'); menu.className = 'sev-dropdown-menu';
  const header = document.createElement('div'); header.className = 'sev-dropdown-header';
  const headerLabel = document.createElement('span'); headerLabel.textContent = 'FILTER BY SEVERITY';
  header.appendChild(headerLabel);
  if (activeSevFilters.size > 0) {
    const clr = document.createElement('button'); clr.className = 'tactics-dropdown-clear'; clr.textContent = '✕ CLEAR ALL';
    clr.addEventListener('click', e => { e.stopPropagation(); activeSevFilters.clear(); closeTacticDropdown(); renderTable(); renderCpePanel(); });
    header.appendChild(clr);
  }
  menu.appendChild(header);

  for (const sev of SEV_ORDER) {
    const count = counts.get(sev); if (!count) continue;
    const cfg = SEV_CFG[sev], isActive = activeSevFilters.has(sev);
    const item = document.createElement('div'); item.className = 'sev-dropdown-item' + (isActive ? ' active' : '');
    const cb = document.createElement('div'); cb.className = 'sev-item-cb';
    if (isActive) cb.style.cssText = `background:${cfg.dot};border-color:${cfg.dot};`;
    else cb.style.borderColor = cfg.dot + '88';
    const dot = document.createElement('span'); dot.className = 'sev-item-dot'; dot.style.background = cfg.dot;
    const lbl = document.createElement('span'); lbl.className = 'sev-item-label'; lbl.textContent = cfg.label; lbl.style.color = isActive ? cfg.itemColor : '#4a6a8a';
    const cnt = document.createElement('span'); cnt.className = 'sev-item-count'; cnt.textContent = count;
    item.appendChild(cb); item.appendChild(dot); item.appendChild(lbl); item.appendChild(cnt);
    item.addEventListener('click', e => {
      e.stopPropagation();
      if (activeSevFilters.has(sev)) activeSevFilters.delete(sev); else activeSevFilters.add(sev);
      renderTable(); renderCpePanel();
      setTimeout(() => { const t = document.querySelector('.sev-dropdown-trigger'); if (t) t.click(); }, 0);
    });
    menu.appendChild(item);
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = menu.classList.contains('open');
    closeTacticDropdown();
    if (!isOpen) {
      const rect = trigger.getBoundingClientRect();
      menu.style.top = (rect.bottom + 4) + 'px'; menu.style.left = rect.left + 'px';
      setTimeout(() => { const mRect = menu.getBoundingClientRect(); if (mRect.right > window.innerWidth - 8) menu.style.left = (rect.right - mRect.width) + 'px'; }, 0);
      menu.classList.add('open'); trigger.classList.add('open');
    }
  });

  wrap.appendChild(trigger); document.body.appendChild(menu);
  return wrap;
}

// ─────────────────────────────────────────────
//  RENDER TABLE
// ─────────────────────────────────────────────
function renderTable() {
  if (!universe) return;
  cleanupTacticMenus();

  const filtered = applyTacticFilter(universe);
  const cols     = FW.map(fw => filtered[fw] || []);
  const total    = cols.reduce((s,c) => s + c.length, 0);
  const maxRows  = Math.max(...cols.map(c => c.length), 0);

  const parts = [];
  if (activeTacticFilters.size > 0)   parts.push(`${activeTacticFilters.size} ATT&CK tactic${activeTacticFilters.size!==1?'s':''}`);
  if (activeD3TacticFilters.size > 0) parts.push(`${activeD3TacticFilters.size} D3FEND tactic${activeD3TacticFilters.size!==1?'s':''}`);
  if (kevFilterActive)                parts.push('KEV');
  if (activeSevFilters.size > 0)      parts.push([...activeSevFilters].join('/'));
  const filterLabel = parts.length > 0 ? ` (filtered by ${parts.join(' + ')})` : '';
  $("result-total").textContent = `${total} ${total===1?'result':'results'}${filterLabel}`;

  const thead = $("col-thead-row"); thead.innerHTML = "";
  FW.forEach((fw, ci) => {
    const fc = FW_CFG[fw], th = document.createElement("th");
    th.style.cssText = `color:${fc.text}; border-top:3px solid ${fc.bg}; border-right:1px solid #111620;`;

    const inner = document.createElement('div'); inner.className = 'col-header-inner';
    const dot = document.createElement('span'); dot.className = 'col-header-dot'; dot.style.background = fc.bg;
    inner.appendChild(dot);
    const label = document.createElement('span'); label.textContent = fw;
    inner.appendChild(label);

    if (fw === "ATT&CK") renderTacticFilter(th, inner, universe["ATT&CK"]);
    if (fw === "D3FEND")  renderD3TacticFilter(th, inner, universe["D3FEND"]);

    if (fw === "CVE") {
      const kevWrap = document.createElement('div');
      kevWrap.className = 'kev-filter-wrap' + (kevFilterActive ? ' active' : '');
      kevWrap.title = kevFilterActive ? 'Showing only KEV CVEs — click to remove filter' : 'Filter: show only CISA KEV CVEs';
      const lbl = document.createElement('span'); lbl.className = 'kev-filter-label'; lbl.textContent = 'KEV';
      kevWrap.appendChild(lbl);
      kevWrap.addEventListener('click', (e) => { e.stopPropagation(); kevFilterActive = !kevFilterActive; renderTable(); renderCpePanel(); });
      inner.appendChild(kevWrap);

      const sevWrap = renderSevFilter(universe["CVE"]);
      if (sevWrap) inner.appendChild(sevWrap);
    }

    const count = document.createElement('span'); count.className = 'col-header-count'; count.textContent = cols[ci].length;
    inner.appendChild(count);
    th.appendChild(inner);
    thead.appendChild(th);
  });

  const tbody = $("col-tbody"); tbody.innerHTML = "";
  for (let i = 0; i < maxRows; i++) {
    const tr = document.createElement("tr");
    FW.forEach((fw, ci) => {
      const fc=FW_CFG[fw], id=cols[ci][i], td=document.createElement("td");
      if (id) {
        const checked=checkedIds.has(id), url=getUrl(id,fw);
        const item=document.createElement("div");
        item.className="cell-item"+(checked?" checked":"");
        item.style.setProperty('--cell-color', fc.bg);
        item.style.setProperty('--cell-text',  fc.text);
        item.style.setProperty('--cell-border',fc.bg+"55");
        item.style.setProperty('--cell-dim',   fc.dim);

        const cb=document.createElement("div"); cb.className="cell-cb";
        cb.title=checked?"Remove from filter":"Add to filter";
        cb.addEventListener("click", e => { e.stopPropagation(); toggleCheck(id); });

        const lnk=document.createElement("a"); lnk.className="cell-id";
        lnk.textContent=id; lnk.title=`Open ${id} on MITRE`;
        if (url) { lnk.href=url; lnk.target="_blank"; lnk.rel="noopener noreferrer"; }
        lnk.addEventListener("click", e => e.stopPropagation());

        item.appendChild(cb); item.appendChild(lnk);
        if (fw === "CVE" && isKev(id)) item.appendChild(makeKevBadge());
        if (fw === "CVE") item.appendChild(makeCvssBadge(id));
        td.appendChild(item);
      } else {
        td.innerHTML = `<span class="col-empty">—</span>`;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  rs.style.display="block"; es.style.display="none";
}

si.addEventListener("keydown", e => { if (e.key==="Enter") doSearch(); });
sb.onclick = () => doSearch();

function setError(msg)    { eb.textContent=msg; eb.style.display=msg?"block":"none"; }
function setLoading(show) { ld.style.display=show?"block":"none"; }
