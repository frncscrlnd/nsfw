<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSFW — Navigator for Security Frameworks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060810;
    --surface: #0a0e14;
    --border: #1a1f2e;
    --green: #00cc77;
    --green-bright: #00ff88;
    --text: #ccc;
    --dim: #333;
  }

  body {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(0,255,100,0.012) 2px, rgba(0,255,100,0.012) 4px
    );
  }

  /* ── loading screen ── */
  #boot-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    transition: opacity 0.5s;
  }
  #boot-screen.hidden { opacity: 0; pointer-events: none; }
  .boot-title { font-size: 3rem; font-weight: 900; color: var(--green); letter-spacing: 0.15em; }
  .boot-log { font-size: 0.72rem; color: #3a6a4a; width: 340px; }
  .boot-log-line { padding: 2px 0; }
  .boot-log-line.ok::before { content: '[OK] '; color: var(--green); }
  .boot-log-line.wait::before { content: '[..] '; color: #555; }
  .boot-bar { width: 340px; height: 2px; background: #1a2a1a; border-radius: 2px; overflow: hidden; }
  .boot-bar-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s ease; }

  /* ── layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 48px 36px; }

  .header-sub   { color: var(--green); font-size: 0.62rem; letter-spacing: 0.25em; margin-bottom: 8px; }
  .header-title {
    font-size: 2.8rem; font-weight: 900; letter-spacing: 0.08em;
    color: #fff; line-height: 1;
    text-shadow: 0 0 40px rgba(0,204,119,0.3);
    margin-bottom: 8px;
  }
  .header-desc { color: #2a4a3a; font-size: 0.75rem; margin-bottom: 40px; }

  /* ── search ── */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-box {
    display: flex; border: 1px solid #1a3a2a; border-radius: 6px;
    overflow: hidden; box-shadow: 0 0 30px rgba(0,204,119,0.05);
  }
  .search-input {
    flex: 1; background: #080f0a; border: none; outline: none;
    color: var(--green-bright); font-size: 1rem; padding: 14px 20px;
    font-family: inherit;
  }
  .search-input::placeholder { color: #1a3a2a; }
  .search-btn {
    background: var(--green); border: none; color: #000;
    padding: 0 30px; cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 0.8rem; letter-spacing: 0.12em;
    transition: background 0.15s;
  }
  .search-btn:hover { background: var(--green-bright); }

  .autocomplete {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #080f0a; border: 1px solid #1a3a2a;
    border-top: none; border-radius: 0 0 6px 6px;
    z-index: 100; display: none; max-height: 280px; overflow-y: auto;
  }
  .autocomplete.show { display: block; }
  .ac-item {
    padding: 10px 20px; cursor: pointer;
    border-bottom: 1px solid #0f1a14;
    display: flex; align-items: center; gap: 12px;
  }
  .ac-item:hover { background: #0d1a12; }

  #active-tags { margin-top: 15px; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── badge ── */
  .badge {
    display: inline-block; border-radius: 4px; padding: 4px 12px;
    font-size: 0.75rem; font-family: inherit;
    border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .badge.sm { padding: 2px 8px; font-size: 0.7rem; }
  .clickable { cursor: pointer; }
  .clickable:hover { filter: brightness(1.3); }

  /* ── feedback ── */
  .error-box {
    padding: 14px 20px; background: #1a0808;
    border: 1px solid #ff444433; border-radius: 6px;
    color: #ff8888; font-size: 0.8rem; margin-bottom: 24px;
  }
  .loading { color: var(--green); font-size: 0.9rem; margin: 40px 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .loading span { animation: pulse 1s infinite; }

  /* ── results ── */
  .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

  .stat-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface); border-radius: 6px; padding: 18px;
    min-width: 180px; flex: 1; border: 1px solid transparent; border-top-width: 3px;
  }
  .stat-card-label  { font-size: 0.7rem; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 8px; }
  .stat-card-count  { font-size: 2rem; font-weight: 900; line-height: 1; margin-bottom: 12px; }
  .stat-card-ids    { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    background: transparent; border: 1px solid #2a2a2a; color: #666;
    border-radius: 4px; padding: 6px 16px; cursor: pointer;
    font-size: 0.75rem; font-family: inherit; transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--green); color: var(--green); }

  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    padding: 14px; text-align: left; color: #445;
    font-size: 0.7rem; letter-spacing: 0.1em;
    background: #0d1117; border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 14px; border-bottom: 1px solid #111; }

  /* ── empty state ── */
  .empty-state { text-align: center; color: #1a2a1a; margin-top: 100px; }
  .empty-state .icon { font-size: 5rem; margin-bottom: 20px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #1a3a2a; border-radius: 3px; }
</style>
</head>
<body>

<!-- Boot screen -->
<div id="boot-screen">
  <div class="boot-title">NSFW</div>
  <div class="boot-log" id="boot-log"></div>
  <div class="boot-bar"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
</div>

<div class="main" id="app" style="display:none;">
  <div style="margin-bottom:40px;">
    <h1 class="header-title">NSFW</h1>
    <div class="header-sub">&#9658; NAVIGATOR for SECURITY FRAMEWORKS</div>
    <div class="header-desc">CVE · CWE · CAPEC · MITRE ATT&amp;CK · D3FEND</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input id="search-input" class="search-input" type="text"
             placeholder="Add a framework ID to start researching..." autocomplete="off">
      <button class="search-btn" id="search-btn">SEARCH</button>
    </div>
    <div class="autocomplete" id="autocomplete"></div>
  </div>

  <div id="active-tags"></div>

  <div class="error-box" id="error-box" style="display:none;"></div>
  <div class="loading"   id="loading"   style="display:none;"><span>&#9658;&#9658;&#9658; processing...</span></div>

  <div id="results" style="display:none;">
    <div class="result-header">
      <div style="color:#555;font-size:0.75rem;" id="result-total"></div>
    </div>
    <div class="stat-cards" id="stat-cards"></div>
    <div class="filter-tabs" id="filter-tabs"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>FRAMEWORK</th>
            <th style="color:#fde047">CVE</th>
            <th style="color:#60a5fa">CWE</th>
            <th style="color:#ffbb44">CAPEC</th>
            <th style="color:#ff8888">ATT&amp;CK</th>
            <th style="color:#5eead4">D3FEND</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="icon">&#9672;</div>
    <p style="letter-spacing:0.3em;font-size:0.8rem;">ADD AN ID FROM A SECURITY FRAMEWORK TO START RESEARCHING</p>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG 
// ─────────────────────────────────────────────
const DATA_BASE = './data/';
const DATA_FILES = {
  cve_cwe:      'cve_cwe.json',
  cwe_capec:    'cwe_capec.json',
  capec_attack: 'capec_attack.json',
  attack_defend:'attack_defend.json',
};

// ─────────────────────────────────────────────
//  FRAMEWORK CONFIG
// ─────────────────────────────────────────────
const FW = ["CVE","CWE","CAPEC","ATT&CK","D3FEND"];
const FW_CFG = {
  "CVE":    { bg:"#eab308", text:"#fde047", dim:"#422108" },
  "CWE":    { bg:"#1e3a8a", text:"#60a5fa", dim:"#0f172a" },
  "CAPEC":  { bg:"#ff9900", text:"#ffbb44", dim:"#2a1800" },
  "ATT&CK": { bg:"#ff4444", text:"#ff8888", dim:"#2a0808" },
  "D3FEND": { bg:"#0d9488", text:"#5eead4", dim:"#0b4a46" },
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let DB = {};           // raw JSON maps
let INV = {};          // inverted maps
let ALL_IDS = [];      // all known IDs for autocomplete
let selectedIds = [];
let activeFilter = "ALL";
let acTimeout = null;

// ─────────────────────────────────────────────
//  BOOT 
// ─────────────────────────────────────────────
const bootLog  = document.getElementById('boot-log');
const bootFill = document.getElementById('boot-bar-fill');

function bootLine(text, status='wait') {
  const div = document.createElement('div');
  div.className = `boot-log-line ${status}`;
  div.textContent = text;
  bootLog.appendChild(div);
  return div;
}

async function loadDatabases() {
  const keys = Object.keys(DATA_FILES);
  const lines = {};
  keys.forEach(k => { lines[k] = bootLine(DATA_FILES[k]); });

  for (let i = 0; i < keys.length; i++) {
    const k = keys[i];
    try {
      const res = await fetch(DATA_BASE + DATA_FILES[k]);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      DB[k] = await res.json();
      lines[k].className = 'boot-log-line ok';
    } catch(e) {
      lines[k].className = 'boot-log-line';
      await new Promise(r => setTimeout(r, 400));
      lines[k].textContent = `[ERR] ${DATA_FILES[k]} — ${e.message}`;
    }
    bootFill.style.width = `${Math.round((i+1)/keys.length*80)}%`;
  }

  // Build inverted maps
  const invertLine = bootLine('building index...');
  DB.cve_cwe      = DB.cve_cwe      || {};
  DB.cwe_capec    = DB.cwe_capec    || {};
  DB.capec_attack = DB.capec_attack || {};
  DB.attack_defend= DB.attack_defend|| {};

  INV.cwe_cve     = invertMap(DB.cve_cwe);
  INV.capec_cwe   = invertMap(DB.cwe_capec);
  INV.atk_capec   = invertMap(DB.capec_attack);
  INV.d3_atk      = invertMap(DB.attack_defend);

  ALL_IDS = Array.from(new Set([
    ...Object.keys(DB.cve_cwe),
    ...Object.keys(DB.cwe_capec),
    ...Object.keys(DB.capec_attack),
    ...Object.keys(DB.attack_defend),
  ])).sort();

  invertLine.className = 'boot-log-line ok';
  bootFill.style.width = '100%';

  await new Promise(r => setTimeout(r, 400));

  // Fade out boot screen
  const bs = document.getElementById('boot-screen');
  bs.classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  setTimeout(() => bs.remove(), 600);
}

loadDatabases();

// ─────────────────────────────────────────────
//  HELPERS 
// ─────────────────────────────────────────────
function invertMap(m) {
  const out = {};
  for (const [k, vals] of Object.entries(m)) {
    for (const v of vals) {
      if (!out[v]) out[v] = [];
      out[v].push(k);
    }
  }
  return out;
}

function expand(ids, mapping) {
  const result = new Set();
  for (const id of ids) {
    for (const v of (mapping[id] || [])) result.add(v);
  }
  return result;
}

const PATTERNS = [
  [/^CVE-\d{4}-\d+$/i,    "CVE"],
  [/^CWE-\d+$/i,          "CWE"],
  [/^CAPEC-\d+$/i,        "CAPEC"],
  [/^T\d{4}(\.\d{3})?$/i, "ATT&CK"],
  [/^D3-[A-Z]+$/i,        "D3FEND"],
];

function detectType(id) {
  for (const [re, t] of PATTERNS) if (re.test(id)) return t;
  return null;
}

function getRelated(inputId) {
  const id = inputId.trim().toUpperCase();
  const tipo = detectType(id);
  if (!tipo) return null;

  const r = {};
  FW.forEach(fw => r[fw] = new Set());
  r[tipo].add(id);

  if (tipo === "CVE") {
    const cwes   = expand([id], DB.cve_cwe);       cwes.forEach(x => r["CWE"].add(x));
    const capecs = expand(cwes, DB.cwe_capec);      capecs.forEach(x => r["CAPEC"].add(x));
    const atks   = expand(capecs, DB.capec_attack); atks.forEach(x => r["ATT&CK"].add(x));
    expand(atks, DB.attack_defend).forEach(x => r["D3FEND"].add(x));
  } else if (tipo === "CWE") {
    const capecs = expand([id], DB.cwe_capec);      capecs.forEach(x => r["CAPEC"].add(x));
    const atks   = expand(capecs, DB.capec_attack); atks.forEach(x => r["ATT&CK"].add(x));
    expand(atks, DB.attack_defend).forEach(x => r["D3FEND"].add(x));
    expand([id], INV.cwe_cve).forEach(x => r["CVE"].add(x));
  } else if (tipo === "CAPEC") {
    const atks = expand([id], DB.capec_attack);     atks.forEach(x => r["ATT&CK"].add(x));
    expand(atks, DB.attack_defend).forEach(x => r["D3FEND"].add(x));
    const cwes = expand([id], INV.capec_cwe);       cwes.forEach(x => r["CWE"].add(x));
    expand(cwes, INV.cwe_cve).forEach(x => r["CVE"].add(x));
  } else if (tipo === "ATT&CK") {
    expand([id], DB.attack_defend).forEach(x => r["D3FEND"].add(x));
    const capecs = expand([id], INV.atk_capec);     capecs.forEach(x => r["CAPEC"].add(x));
    const cwes   = expand(capecs, INV.capec_cwe);   cwes.forEach(x => r["CWE"].add(x));
    expand(cwes, INV.cwe_cve).forEach(x => r["CVE"].add(x));
  } else if (tipo === "D3FEND") {
    const atks   = expand([id], INV.d3_atk);        atks.forEach(x => r["ATT&CK"].add(x));
    const capecs = expand(atks, INV.atk_capec);     capecs.forEach(x => r["CAPEC"].add(x));
    const cwes   = expand(capecs, INV.capec_cwe);   cwes.forEach(x => r["CWE"].add(x));
    expand(cwes, INV.cwe_cve).forEach(x => r["CVE"].add(x));
  }

  return r;
}

// ─────────────────────────────────────────────
//  SEARCH LOGIC 
// ─────────────────────────────────────────────
function searchIds(queryIds) {
  if (!queryIds.length) return { error: "Nessun ID fornito" };

  const firstId = queryIds[0];
  let finalR = getRelated(firstId);
  if (!finalR) return { error: `ID non riconosciuto: ${firstId}` };

  for (const nextId of queryIds.slice(1)) {
    const existsInGraph = FW.some(fw => finalR[fw].has(nextId));
    if (!existsInGraph) {
      return {
        error: `L'ID ${nextId} non è correlato alla selezione attuale e non può essere aggiunto.`,
        popLast: true,
      };
    }
    const nextRes = getRelated(nextId);
    FW.forEach(fw => {
      finalR[fw] = new Set([...finalR[fw]].filter(x => nextRes[fw].has(x)));
    });
  }

  const total = FW.reduce((s, fw) => s + finalR[fw].size, 0);
  if (total === 0) return { error: "La combinazione di questi ID non produce risultati comuni." };

  return {
    ids_cercati: queryIds,
    result: Object.fromEntries(FW.map(fw => [fw, [...finalR[fw]].sort()])),
    total,
  };
}

// ─────────────────────────────────────────────
//  UI
// ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const si = $("search-input"), sb = $("search-btn"), ac = $("autocomplete");
const eb = $("error-box"), ld = $("loading"), rs = $("results"), es = $("empty-state");
const tagsArea = $("active-tags");

function makeBadge(fw, label, small, onClick, removable = false) {
  const c = FW_CFG[fw] || { bg:"#444", text:"#ccc", dim:"#222" };
  const el = document.createElement("span");
  el.className = "badge" + (small ? " sm" : "") + (onClick ? " clickable" : "");
  el.textContent = removable ? `${label} ✕` : label;
  el.style.cssText = `background:${c.dim};color:${c.text};border-color:${c.bg}44;`;
  if (onClick) el.addEventListener("click", e => { e.stopPropagation(); onClick(); });
  return el;
}

async function doSearch(q) {
  const val = (q || si.value).trim().toUpperCase();
  if (!val) return;
  if (selectedIds.includes(val)) { si.value = ""; return; }
  if (!detectType(val)) { setError(`ID non riconosciuto: "${val}"`); si.value = ""; return; }

  selectedIds.push(val);
  si.value = "";
  ac.classList.remove("show");
  updateUI();
}

function removeId(id) {
  selectedIds = selectedIds.filter(x => x !== id);
  if (!selectedIds.length) resetSearch();
  else updateUI();
}

function resetSearch() {
  selectedIds = [];
  rs.style.display = "none";
  es.style.display = "block";
  tagsArea.innerHTML = "";
  setError("");
}

function updateUI() {
  setError("");
  setLoading(true);
  renderTags();

  setTimeout(() => {
    const data = searchIds(selectedIds);
    setLoading(false);

    if (data.error) {
      setError(data.error);
      if (data.popLast) { selectedIds.pop(); renderTags(); }
      return;
    }

    renderResults(data);
  }, 10);
}

function renderTags() {
  tagsArea.innerHTML = "";
  selectedIds.forEach(id => {
    const type = detectType(id) || "UNKNOWN";
    tagsArea.appendChild(makeBadge(type, id, false, () => removeId(id), true));
  });
}

function renderResults(data) {
  $("result-total").textContent = `${data.total} risultati totali`;

  // Stat cards
  const sc = $("stat-cards"); sc.innerHTML = "";
  FW.forEach(fw => {
    const ids = data.result[fw] || [];
    const fc = FW_CFG[fw];
    const card = document.createElement("div"); card.className = "stat-card";
    card.style.cssText = `border-color:${fc.bg}33; border-top-color:${fc.bg};`;
    card.innerHTML = `
      <div class="stat-card-label" style="color:${fc.text}">${fw}</div>
      <div class="stat-card-count" style="color:${fc.bg}">${ids.length}</div>
    `;
    const iw = document.createElement("div"); iw.className = "stat-card-ids";
    ids.slice(0, 5).forEach(id => iw.appendChild(makeBadge(fw, id, true, () => doSearch(id))));
    if (ids.length > 5) {
      const more = document.createElement("span");
      more.className = "badge sm";
      more.style.cssText = `background:#111;color:#444;border-color:#222;`;
      more.textContent = `+${ids.length - 5} more`;
      iw.appendChild(more);
    }
    card.appendChild(iw);
    sc.appendChild(card);
  });

  renderFilterTabs(data);
  renderTable(data);
  rs.style.display = "block";
  es.style.display = "none";
}

function renderFilterTabs(data) {
  const ft = $("filter-tabs"); ft.innerHTML = "";
  const allRows = [];
  FW.forEach(f => (data.result[f]||[]).forEach(id => allRows.push({id, f})));

  ["ALL", ...FW].forEach(f => {
    const count = f === "ALL" ? allRows.length : (data.result[f]||[]).length;
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (activeFilter === f ? " active" : "");
    btn.textContent = `${f} (${count})`;
    btn.onclick = () => { activeFilter = f; renderFilterTabs(data); renderTable(data); };
    ft.appendChild(btn);
  });
}

function renderTable(data) {
  const tb = $("result-tbody"); tb.innerHTML = "";
  const rows = [];
  FW.forEach(f => (data.result[f]||[]).forEach(id => rows.push({f, id})));
  const filtered = activeFilter === "ALL" ? rows : rows.filter(r => r.f === activeFilter);

  filtered.forEach(row => {
    const tr = document.createElement("tr");
    const fc = FW_CFG[row.f];
    tr.innerHTML = `
      <td><span class="clickable" style="color:${fc.text}" onclick="doSearch('${row.id}')">${row.id}</span></td>
      <td><span class="badge sm" style="background:${fc.dim};color:${fc.text}">${row.f}</span></td>
    `;
    FW.forEach(f => {
      const td = document.createElement("td");
      td.style.textAlign = "center";
      td.innerHTML = row.f === f
        ? `<span style="color:${fc.bg}">●</span>`
        : (data.result[f]||[]).length > 0
          ? `<span style="color:#333">✓</span>`
          : `<span style="color:#111">·</span>`;
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
}

// ─────────────────────────────────────────────
//  AUTOCOMPLETE
// ─────────────────────────────────────────────
si.addEventListener("input", () => {
  clearTimeout(acTimeout);
  const q = si.value.trim().toUpperCase();
  if (q.length < 2) { ac.classList.remove("show"); return; }
  acTimeout = setTimeout(() => {
    const matches = ALL_IDS.filter(id => id.includes(q)).slice(0, 10);
    ac.innerHTML = "";
    if (!matches.length) { ac.classList.remove("show"); return; }
    matches.forEach(id => {
      const div = document.createElement("div"); div.className = "ac-item";
      const type = detectType(id) || "?";
      const fc = FW_CFG[type] || {};
      div.innerHTML = `<span style="color:${fc.text||'#ccc'}">${id}</span><span class="badge sm" style="background:${fc.dim||'#222'};color:${fc.text||'#ccc'}">${type}</span>`;
      div.onclick = () => doSearch(id);
      ac.appendChild(div);
    });
    ac.classList.add("show");
  }, 150);
});

si.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
sb.onclick = () => doSearch();
document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) ac.classList.remove("show");
});

function setError(msg)   { eb.textContent = msg; eb.style.display = msg ? "block" : "none"; }
function setLoading(show){ ld.style.display = show ? "block" : "none"; }
</script>
</body>
